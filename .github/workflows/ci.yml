name: CI

on:
  push:
    branches: [main, feature/*, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Quick validation on all platforms
  test-cross-platform:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Run type checking
        run: npm run typecheck

      - name: Run unit tests
        run: npm test -- --run
        env:
          CI: true

      - name: Report test results
        if: always()
        run: |
          echo "Tests completed on ${{ matrix.os }}"

  # Build verification
  build-verification:
    name: Build Verification (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test-cross-platform

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build-script: build:win
            artifact-name: windows-build-test
          - os: macos-latest
            build-script: build:mac
            artifact-name: macos-build-test
          - os: ubuntu-latest
            build-script: build:linux
            artifact-name: linux-build-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run ${{ matrix.build-script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/
          retention-days: 1

  # CI Summary
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test-cross-platform, build-verification]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- Cross-platform tests: ${{ needs.test-cross-platform.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Verification" >> $GITHUB_STEP_SUMMARY
          echo "- Builds: ${{ needs.build-verification.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.test-cross-platform.result }}" == "success" ] && \
             [ "${{ needs.build-verification.result }}" == "success" ]; then
            echo "✅ All CI checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some CI checks failed." >> $GITHUB_STEP_SUMMARY
          fi
