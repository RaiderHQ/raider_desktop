name: Build Test (All Platforms)

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths: ['src/**', 'package.json', 'electron-builder.yml']

jobs:
  typecheck-and-test:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm test -- --run

  build-smoke:
    name: Smoke Build (${{ matrix.os }})
    needs: typecheck-and-test
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Compile (no packaging)
        run: npx electron-vite build
