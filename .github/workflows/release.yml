name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm test -- --run

  build:
    name: Build (${{ matrix.platform }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macOS
            build_cmd: npm run build:mac
            artifact: ruby-raider-mac
            glob: 'dist/*.dmg'
          - os: windows-latest
            platform: Windows
            build_cmd: npm run build:win
            artifact: ruby-raider-windows
            glob: 'dist/*setup*.exe'
          - os: ubuntu-latest
            platform: Linux
            build_cmd: npm run build:linux
            artifact: ruby-raider-linux
            glob: |
              dist/*.AppImage
              dist/*.deb
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: ${{ matrix.build_cmd }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.glob }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Ruby Raider ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/*
          body: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | macOS | `Ruby.Raider-*.dmg` |
            | Windows | `ruby-raider-*-setup.exe` |
            | Linux (AppImage) | `ruby-raider-*.AppImage` |
            | Linux (Debian) | `ruby-raider-*.deb` |

            ### Prerequisites
            - [rbenv](https://github.com/rbenv/rbenv) with Ruby 3.0.0+
            - `gem install ruby_raider`

            ---
            *Auto-generated release. See [full changelog](https://github.com/RaiderHQ/raider_desktop/commits/${{ github.ref_name }}) for details.*
