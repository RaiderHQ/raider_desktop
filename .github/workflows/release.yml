name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v3.0.0). Leave empty to build without creating a release.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm test -- --run

  build:
    name: Build (${{ matrix.platform }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macOS (Apple Silicon)
            build_cmd: npm run build:mac
            artifact: ruby-raider-mac-arm64
            glob: 'dist/*.dmg'
          - os: macos-13
            platform: macOS (Intel)
            build_cmd: npm run build:mac
            artifact: ruby-raider-mac-intel
            glob: 'dist/*.dmg'
          - os: windows-latest
            platform: Windows
            build_cmd: npm run build:win
            artifact: ruby-raider-windows
            glob: 'dist/*setup*.exe'
          - os: ubuntu-latest
            platform: Linux
            build_cmd: npm run build:linux
            artifact: ruby-raider-linux
            glob: |
              dist/*.AppImage
              dist/*.deb
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: ${{ matrix.build_cmd }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.glob }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create tag (manual dispatch only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Ruby Raider ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: artifacts/*
