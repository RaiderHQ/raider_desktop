name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test -- --reporter=verbose --run

  build:
    name: Build (${{ matrix.artifact }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_cmd: npm run build:mac
            artifact: mac-arm64-build
            glob: 'dist/*.dmg'
          - os: macos-13
            build_cmd: npm run build:mac
            artifact: mac-intel-build
            glob: 'dist/*.dmg'
          - os: windows-latest
            build_cmd: npm run build:win
            artifact: windows-build
            glob: 'dist/*setup*.exe'
          - os: ubuntu-latest
            build_cmd: npm run build:linux
            artifact: linux-build
            glob: |
              dist/*.AppImage
              dist/*.deb
              dist/*.snap
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: ${{ matrix.build_cmd }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.glob }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
