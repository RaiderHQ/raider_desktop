<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Option C: RR Monogram — two R letters forming a ruby gem silhouette -->

  <!-- Rounded square container -->
  <rect x="15" y="15" width="170" height="170" rx="30" stroke="#C14420" stroke-width="4" fill="none"/>

  <!-- First R -->
  <path d="M50 150 L50 50 L90 50 Q115 50 115 72 Q115 94 90 94 L50 94"
        stroke="#C14420" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M88 94 L115 150" stroke="#C14420" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Second R (slightly offset, creates depth) -->
  <path d="M95 150 L95 50 L130 50 Q155 50 155 72 Q155 94 130 94 L95 94"
        stroke="#2C2D30" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <path d="M128 94 L155 150" stroke="#2C2D30" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.85"/>
</svg>