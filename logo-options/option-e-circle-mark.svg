<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Option E: Abstract Circle Mark — ruby gem with crossed swords, ultra minimal -->

  <!-- Outer circle -->
  <circle cx="100" cy="100" r="88" stroke="#C14420" stroke-width="3" fill="none"/>

  <!-- Inner circle (subtle) -->
  <circle cx="100" cy="100" r="70" stroke="#C14420" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Ruby gem centered -->
  <polygon points="100,40 130,65 125,105 75,105 70,65" fill="#C14420"/>

  <!-- Crossed swords behind/below gem -->
  <line x1="45" y1="145" x2="120" y2="70" stroke="#2C2D30" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="155" y1="145" x2="80" y2="70" stroke="#2C2D30" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Sword pommels -->
  <circle cx="45" cy="145" r="4" fill="#2C2D30" opacity="0.8"/>
  <circle cx="155" cy="145" r="4" fill="#2C2D30" opacity="0.8"/>

  <!-- Sword crossguards -->
  <line x1="108" y1="77" x2="122" y2="63" stroke="#2C2D30" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="78" y1="77" x2="92" y2="63" stroke="#2C2D30" stroke-width="2" stroke-linecap="round" opacity="0.6" transform="rotate(90, 85, 70)"/>
</svg>