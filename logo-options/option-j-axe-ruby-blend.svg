<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Option J: Nordic axe where the blade incorporates a ruby gem facet pattern + runes on handle -->

  <!-- Axe handle -->
  <rect x="112" y="48" width="16" height="180" rx="4" fill="#2C2D30"/>

  <!-- Wood detail -->
  <line x1="117" y1="95" x2="117" y2="228" stroke="#404145" stroke-width="0.8" opacity="0.4"/>
  <line x1="123" y1="95" x2="123" y2="228" stroke="#404145" stroke-width="0.7" opacity="0.3"/>

  <!-- Leather grip -->
  <g stroke="#5C3D2E" stroke-width="2.5">
    <line x1="110" y1="158" x2="130" y2="154"/>
    <line x1="110" y1="166" x2="130" y2="162"/>
    <line x1="110" y1="174" x2="130" y2="170"/>
    <line x1="110" y1="182" x2="130" y2="178"/>
    <line x1="110" y1="190" x2="130" y2="186"/>
    <line x1="110" y1="198" x2="130" y2="194"/>
    <line x1="110" y1="206" x2="130" y2="202"/>
  </g>

  <!-- ═══ Axe head with ruby-faceted blade ═══ -->

  <!-- Main axe head shape -->
  <path d="M128 45
           Q155 30 180 25
           Q205 22 218 40
           L222 58
           Q226 82 215 105
           L195 140
           Q178 162 155 168
           L140 164
           Q132 158 130 144
           L128 90 Z"
        fill="#C14420"/>

  <!-- Ruby facet pattern on blade (gem-cut lines) -->
  <path d="M180 25 L190 60 L195 140" stroke="#DA917B" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M218 40 L190 60" stroke="#DA917B" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M222 58 L190 60" stroke="white" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M215 105 L190 60" stroke="#961E12" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M190 60 L178 100 L155 168" stroke="#961E12" stroke-width="1.2" fill="none" opacity="0.25"/>

  <!-- Left cheek -->
  <path d="M112 45
           Q96 32 82 40
           Q72 50 75 68
           L80 82
           Q88 95 102 90
           L112 84 Z"
        fill="#C14420"/>

  <!-- Blade edge (polished) -->
  <path d="M218 40 L222 58 Q226 82 215 105 L195 140 Q178 162 155 168"
        stroke="#DA917B" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Secondary edge highlight -->
  <path d="M220 50 Q224 78 214 100 L196 135 Q180 158 158 165"
        stroke="white" stroke-width="1.2" fill="none" opacity="0.2" stroke-linecap="round"/>

  <!-- Socket -->
  <ellipse cx="120" cy="82" rx="14" ry="5.5" stroke="#1A1B1D" stroke-width="2" fill="none" opacity="0.5"/>
  <ellipse cx="120" cy="76" rx="13" ry="4" stroke="#1A1B1D" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- ═══ Runes carved into handle ═══ -->
  <g stroke="#C14420" stroke-width="2.2" stroke-linecap="round">
    <!-- ᚱ Raido (R - raid/journey) -->
    <g transform="translate(120, 104)">
      <line x1="0" y1="-11" x2="0" y2="11"/>
      <line x1="0" y1="-11" x2="9" y2="-4"/>
      <line x1="9" y1="-4" x2="0" y2="3"/>
    </g>

    <!-- ᚱ Second Raido (second R in Ruby Raider) -->
    <g transform="translate(120, 128)">
      <line x1="0" y1="-9" x2="0" y2="9"/>
      <line x1="0" y1="-9" x2="8" y2="-3"/>
      <line x1="8" y1="-3" x2="0" y2="2"/>
    </g>

    <!-- ᛏ Tiwaz (victory arrow - between the Rs) -->
    <g transform="translate(120, 148)">
      <line x1="0" y1="-7" x2="0" y2="7"/>
      <line x1="-5" y1="-7" x2="0" y2="-7"/>
      <line x1="5" y1="-7" x2="0" y2="-7"/>
    </g>
  </g>

  <!-- Pommel -->
  <ellipse cx="120" cy="230" rx="12" ry="4.5" fill="#3A3B40"/>
</svg>