<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Option B: Minimal Viking Helmet — single clean silhouette, no rivets or detail -->

  <!-- Circle background -->
  <circle cx="100" cy="100" r="90" stroke="#C14420" stroke-width="4" fill="none"/>

  <!-- Simplified helmet dome -->
  <path d="M55 110 Q55 55 100 45 Q145 55 145 110"
        stroke="#C14420" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Helmet brim -->
  <line x1="45" y1="110" x2="155" y2="110" stroke="#C14420" stroke-width="5" stroke-linecap="round"/>

  <!-- Nose guard -->
  <line x1="100" y1="110" x2="100" y2="140" stroke="#C14420" stroke-width="4" stroke-linecap="round"/>

  <!-- Horns — simple elegant curves -->
  <path d="M62 72 Q45 40 30 25" stroke="#C14420" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M138 72 Q155 40 170 25" stroke="#C14420" stroke-width="4.5" fill="none" stroke-linecap="round"/>
</svg>